@if (isAddingTask) {
  <app-new-task (cancel)="onCancelAddTask()" (submit)="onCreateTask($event)" />
}

<section id="tasks">
  <header>
    <h2>{{ userName() }}'s tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
      <li>
        <app-task [task]="task" (complete)="onTaskComplete($event)" />
      </li>
    }
  </ul>
</section>
