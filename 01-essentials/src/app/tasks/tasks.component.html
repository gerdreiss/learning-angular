@if (isAddingTask) {
  <app-new-task (cancel)="onCancelAddTask()" (submit)="onCreateTask($event)" />
}
@if (editedTask) {
  <app-edit-task
    [task]="editedTask"
    (cancel)="onCancelEditTask()"
    (submit)="onUpdateTask($event)"
  />
}

<section id="tasks">
  <header>
    <h2>{{ userName() }}'s tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks; track task.id) {
      <li>
        <app-task
          [task]="task"
          (edit)="onStartEditTask($event)"
          (complete)="onTaskComplete($event)"
        />
      </li>
    }
  </ul>
</section>
