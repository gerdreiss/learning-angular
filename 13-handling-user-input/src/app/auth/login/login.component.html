<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <h2>Login</h2>

  <div class="control-row">
    <div class="control no-margin">
      <label for="email">Email</label>
      <input id="email" type="email" [formControl]="form.controls.email" />
    </div>

    <div class="control no-margin">
      <label for="password">Password</label>
      <input id="password" type="password" formControlName="password" />
    </div>

    <button class="button">Login</button>
  </div>

  @if (isEmailInvalid()) {
    <p class="control-error">Invalid email address entered!</p>
  }
  @if (isPasswordInvalid()) {
    <p class="control-error">
      Invalid password entered - must be at least 8 characters long and contain
      a special character!
    </p>
  }
</form>
