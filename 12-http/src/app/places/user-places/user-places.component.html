<app-places-container title="Your Favorite Places">
  @if (isFetching()) {
    <p class="fallback-text">Fetching...</p>
  }
  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
  @if (userPlaces()) {
    <app-places [places]="userPlaces()" (selectPlace)="onSelectPlace($event)" />
  } @else if (userPlaces().length === 0) {
    <p class="fallback-text">Unfortunately, no places could be found.</p>
  }
</app-places-container>
